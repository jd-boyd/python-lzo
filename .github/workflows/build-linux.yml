name: Build wheels for Linux

on:
  workflow_dispatch:
  workflow_call:
  push:
    tags:
      - v*

jobs:
  build-wheels-native:
    name: "native x86_64 i686"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.23
        env:
          CIBW_ARCHS_LINUX: "x86_64 i686"
          CIBW_TEST_COMMAND: "python -c \"import lzo; d=b'test'*42; assert lzo.decompress(lzo.compress(d))==d\""

      - name: Upload wheels
        uses: actions/upload-artifact@v6
        with:
          name: wheels-linux-native
          path: wheelhouse/*.whl
          if-no-files-found: error

  build-wheels-aarch64:
    name: "emulated aarch64"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.23
        env:
          CIBW_ARCHS_LINUX: aarch64
          CIBW_TEST_COMMAND: "python -c \"import lzo; d=b'test'*42; assert lzo.decompress(lzo.compress(d))==d\""

      - name: Upload wheels
        uses: actions/upload-artifact@v6
        with:
          name: wheels-linux-aarch64
          path: wheelhouse/*.whl
          if-no-files-found: error

  build-wheels-ppc64le:
    name: "emulated ppc64le"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.23
        env:
          CIBW_ARCHS_LINUX: ppc64le
          CIBW_TEST_COMMAND: "python -c \"import lzo; d=b'test'*42; assert lzo.decompress(lzo.compress(d))==d\""

      - name: Upload wheels
        uses: actions/upload-artifact@v6
        with:
          name: wheels-linux-ppc64le
          path: wheelhouse/*.whl
          if-no-files-found: error

  build-wheels-s390x:
    name: "emulated s390x"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.23
        env:
          CIBW_ARCHS_LINUX: s390x
          CIBW_TEST_COMMAND: "python -c \"import lzo; d=b'test'*42; assert lzo.decompress(lzo.compress(d))==d\""

      - name: Upload wheels
        uses: actions/upload-artifact@v6
        with:
          name: wheels-linux-s390x
          path: wheelhouse/*.whl
          if-no-files-found: error

  build-wheels-armv7l:
    name: "emulated armv7l"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.23
        env:
          CIBW_ARCHS_LINUX: armv7l
          CIBW_TEST_COMMAND: "python -c \"import lzo; d=b'test'*42; assert lzo.decompress(lzo.compress(d))==d\""

      - name: Upload wheels
        uses: actions/upload-artifact@v6
        with:
          name: wheels-linux-armv7l
          path: wheelhouse/*.whl
          if-no-files-found: error

  sdist:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.8"

      - name: Build sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build -s

      - name: Upload sdist
        uses: actions/upload-artifact@v6
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error
