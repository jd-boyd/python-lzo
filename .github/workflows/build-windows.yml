name: Build wheels for Windows

on:
  workflow_dispatch:
  workflow_call:
  push:
    tags:
      - v*

jobs:
  build:
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: cmd
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
        os: [windows-latest, windows-latest-arm64]
    name: "${{ matrix.os }} py${{ matrix.python-version }}"
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Build wheel
        env:
          LZO_DIR: .\lzo-2.10
        run: |
          python -m pip install -U pip setuptools wheel build
          python -m build -w --no-isolation
      - name: Smoke-test wheel
        shell: bash
        run: |
          python -m pip install dist/*.whl
          python -c "import lzo; d=b'test'*42; assert lzo.decompress(lzo.compress(d))==d; print('OK')"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.repository.name }}-${{ matrix.os }}-py${{ matrix.python-version }}
          path: dist\*.whl
          overwrite: true
          if-no-files-found: error
