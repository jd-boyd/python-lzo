name: Build/release wheels for Windows

on:
  workflow_dispatch:
    inputs:
      custom_ref:
        description: 'custom ref/tag'
        required: false
      do_release:
        description: 'Creating release from artifacts: type "y" to enable'
        required: false
      publish_to_testpypi:
        description: 'Publish wheels to TestPyPI'
        type: boolean
        default: false
  push:
    tags:
      - v*
jobs:
  build:
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: cmd
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
        os: [windows-latest, windows-latest-arm64]
    name: "${{ matrix.os }} py${{ matrix.python-version }}"
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Build wheel
        env:
          LZO_DIR: .\lzo-2.10
        run: |
          python -m pip install -U pip setuptools wheel build
          python -m build -w --no-isolation
      - name: Smoke-test wheel
        shell: bash
        run: |
          python -m pip install dist/*.whl
          python -c "import lzo; d=b'test'*42; assert lzo.decompress(lzo.compress(d))==d; print('OK')"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.repository.name }}-${{ matrix.os }}-py${{ matrix.python-version }}
          path: dist\*.whl
          overwrite: true
          if-no-files-found: error

  release:
    if: ${{ github.event.inputs.do_release == 'y' && github.event.inputs.custom_ref != '' }}
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - name: List all files
        run: ls -R ./artifacts

      - name: do release
        run: |
          gh release create '${{ github.event.inputs.custom_ref}}' \
            -t '${{ github.event.inputs.custom_ref}}' \
            --title "${{ github.event.repository.name }}-${{ github.event.inputs.custom_ref}}" \
            --target '${{ github.ref_name }}' \
            --latest=true \
            --generate-notes \
            --repo ${GITHUB_REPOSITORY}
          gh release upload '${{ github.event.inputs.custom_ref}}' --repo ${GITHUB_REPOSITORY} --clobber \
            ./artifacts/*

  publish-testpypi:
    name: Publish to TestPyPI
    needs: [build]
    if: inputs.publish_to_testpypi
    runs-on: ubuntu-latest
    environment:
      name: release
      url: https://test.pypi.org/p/python-lzo
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v6
        with:
          path: dist
      - run: |
          mv dist/*/*.whl dist/ 2>/dev/null || true
          find dist -mindepth 1 -type d -delete
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
